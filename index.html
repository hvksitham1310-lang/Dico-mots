<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dico des Abréviations</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <h1>Dico des Abréviations</h1>
        <p>Trouve instantanément le sens des mots abrégés.</p>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Recherche un mot ou une abréviation...">
        </div>

        <div id="dictionary-list" class="grid-container">
            </div>

        <div id="admin-panel">
            <h2>Créateur de mots automatique 🛠️</h2>
            <div class="form-group">
                <input type="text" id="newAbrev" placeholder="Ex: vrm">
                <input type="text" id="newComplet" placeholder="Ex: Vraiment">
                <button id="generateBtn">Ajouter en direct mondial 🚀</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
